<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc"><title id="title">Workforce skills and talent intelligence architecture</title><desc id="desc">Conceptual pipeline from employee skills and project demand to gap analysis, learning paths, burnout risk, contractor alternatives, fairness audit and reports.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07151f"/><stop offset="1" stop-color="#17364e"/></linearGradient><linearGradient id="g" x1="0" x2="1"><stop stop-color="#38d7c8"/><stop offset="1" stop-color="#6ba7ff"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".25"/></filter><marker id="a" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M0 0 L12 6 L0 12z" fill="#b8d8e8"/></marker><style>.h{font-family:Arial;font-size:34px;font-weight:700;fill:#f8fcff}.p{font-family:Arial;font-size:16px;fill:#bdd6e6}.t{font-family:Arial;font-size:18px;font-weight:700;fill:#f8fcff}.b{font-family:Arial;font-size:14px;fill:#c8dde8}.n{font-family:Arial;font-size:14px;font-weight:700;fill:#07151f}</style></defs><rect width="1440" height="760" fill="url(#bg)"/><text x="70" y="78" class="h">Workforce Skills and Talent Intelligence Platform</text><text x="70" y="110" class="p">Synthetic-first research architecture for skills, demand, learning, burnout-risk proxies, contractor alternatives, and fairness review.</text><line x1="70" y1="142" x2="1370" y2="142" stroke="#2a6076"/><g filter="url(#s)"><rect x="80" y="195" width="250" height="210" rx="18" fill="#123047" stroke="#3b7188"/><rect x="105" y="220" width="44" height="26" rx="13" fill="url(#g)"/><text x="120" y="239" class="n">01</text><text x="105" y="280" class="t">Talent inventory</text><text x="105" y="313" class="b">Employees and roles</text><text x="105" y="339" class="b">Skills and levels</text><text x="105" y="365" class="b">Capacity and allocation</text></g><g filter="url(#s)"><rect x="395" y="195" width="250" height="210" rx="18" fill="#123047" stroke="#3b7188"/><rect x="420" y="220" width="44" height="26" rx="13" fill="url(#g)"/><text x="435" y="239" class="n">02</text><text x="420" y="280" class="t">Project demand</text><text x="420" y="313" class="b">Priority and deadlines</text><text x="420" y="339" class="b">Skill requirements</text><text x="420" y="365" class="b">People and level needs</text></g><g filter="url(#s)"><rect x="710" y="195" width="250" height="210" rx="18" fill="#123047" stroke="#3b7188"/><rect x="735" y="220" width="44" height="26" rx="13" fill="url(#g)"/><text x="750" y="239" class="n">03</text><text x="735" y="280" class="t">Risk intelligence</text><text x="735" y="313" class="b">Skill gap scoring</text><text x="735" y="339" class="b">Burnout-risk proxy</text><text x="735" y="365" class="b">Fairness audit</text></g><g filter="url(#s)"><rect x="1025" y="195" width="335" height="210" rx="18" fill="#123047" stroke="#3b7188"/><rect x="1050" y="220" width="44" height="26" rx="13" fill="url(#g)"/><text x="1065" y="239" class="n">04</text><text x="1050" y="280" class="t">Decision support</text><text x="1050" y="313" class="b">Learning paths</text><text x="1050" y="339" class="b">Hire or contractor options</text><text x="1050" y="365" class="b">Reports and audit log</text></g><path d="M330 300 H386" stroke="#b8d8e8" stroke-width="3" marker-end="url(#a)"/><path d="M645 300 H701" stroke="#b8d8e8" stroke-width="3" marker-end="url(#a)"/><path d="M960 300 H1016" stroke="#b8d8e8" stroke-width="3" marker-end="url(#a)"/><g filter="url(#s)"><rect x="165" y="520" width="1110" height="120" rx="20" fill="#463826" stroke="#bf965a"/><text x="200" y="562" class="t">Human governance boundary</text><text x="200" y="596" class="b">The lab produces planning evidence only. Real employment, compensation, promotion, termination, health, or performance decisions require manager, HR, legal, fairness, and employee-development review.</text></g></svg>